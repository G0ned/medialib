{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!Se define el título de la página>
    <title>
        {% block title %}
            Django App
        {% endblock %}
    </title>
</head>
<!Definición del cuerpo del HTML>
<body class="flex flex-col min-h-screen">
    <div class="grow">
        <!Comprobación de si hay mensajes>
        {% if messages %}
        <!Bucle para iterar sobre los mensajes. Si los hay se muestran en la parte superior>
            {% for message in messages %}
                <div 
                    x-data="{ show: true }"
                    x-init="setTimeout(() => show = false, 4000)"
                    x-show="show">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        <!Barra de navegación con links a otras partes de la página>
        <nav class="bg-blue-600 x-data:{open: false}">
            <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
                <div class="flex h-16 items-center justify-between">
                    <div class="flex items-center">
                        <div class="shrink-0">
                            <div class="hidden md:block">
                                <div class="ml-4 flex items-baseline space-x-2">
                                    <a class="bg-blue-400 rounded-md px-3 py-2 text-sm font-medium" 
                                        href="{% url 'medialib:home' %}">🏠
                                    </a>
                                    <a class="bg-blue-400 rounded-md px-3 py-2 text-sm font-medium" 
                                        href="{% url 'medialib:create.user' %}"> Registro </a>
                                    <a class="bg-blue-400 rounded-md px-3 py-2 text-sm font-medium" 
                                        href="{% url 'medialib:login' %}"> Login </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </nav>
        <main>
            {% block content%}
            
            {%endblock%}
        </main>    
    </div>
</body>
</html>
